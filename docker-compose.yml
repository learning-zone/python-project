version: '3.8'

services:
  # --- DATABASE LAYER ---
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-lms_db}
      POSTGRES_USER: ${DB_USER:-lms_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lms_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lms_admin} -d ${DB_NAME:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CACHE & TASK BROKER LAYER ---
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- BACKEND API LAYER ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-lms_db}
      - DB_USER=${DB_USER:-lms_admin}
      - DB_PASSWORD=${DB_PASSWORD:-lms_secure_pass}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- ASYNCHRONOUS TASK WORKER ---
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_celery_worker
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-lms_db}
      - DB_USER=${DB_USER:-lms_admin}
      - DB_PASSWORD=${DB_PASSWORD:-lms_secure_pass}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- FRONTEND LAYER ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
