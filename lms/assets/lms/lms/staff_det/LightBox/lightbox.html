<!DOCTYPE html>
<html>
	<head>
		<meta charset='utf-8'/>
		<title>lightbox Examples</title>
		<style>
			body{font:12px/1.2 Verdana, sans-serif; padding:0 10px;}
			a:link, a:visited{text-decoration:none; color:#416CE5; border-bottom:1px solid #416CE5;}
			h2{font-size:13px; margin:15px 0 0 0;}
		</style>
		<link rel="stylesheet" href="lightbox.css" />
		<script src="jquery/1.10.2/jquery.min.js"></script>
		<script src="jquery/jquery.lightbox.js"></script>
		<script>
			$(document).ready(function(){
				//Assign the lightbox event to elements
				$(".iframe").lightbox({iframe:true, width:"80%", height:"80%"});								
				//Preserving a JavaScript event for inline calls.
				$("#click").click(function(){ 
					$('#click').css({"background-color":"#f00", "color":"#fff", "cursor":"inherit"}).text("Open this window again and this message will still be here.");
					return false;
				});
			});
		</script>
	</head>
	<body>
        <p><a class='iframe' href="example.htm">LightBox Example</a></p>
	</body>
</html>
